name: Build and Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Client unit tests
        working-directory: client
        run: npm ci && npm test

      - name: Lowercase owner name
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/skyreach-server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/skyreach-client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client
