services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skyreach
      POSTGRES_USER: skyreach
      POSTGRES_PASSWORD: skyreach_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyreach -d skyreach"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/captainaarav/skyreach-server:latest
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/api/health', (r)=>{ let b=''; r.on('data', c=>b+=c); r.on('end', ()=>process.exit(r.statusCode===200 && b.includes('ok') ? 0 : 1)); }).on('error', ()=>process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      DATABASE_URL: postgresql://skyreach:skyreach_pass@db:5432/skyreach
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:3000/booking/success?session_id={CHECKOUT_SESSION_ID}}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:3000/services}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-bookings@skyreachvisuals.co.uk}
      PORT: 5000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  client:
    image: ghcr.io/captainaarav/skyreach-client:latest
    ports:
      - "3003:80"
    volumes:
      - ./media:/usr/share/nginx/html/media:ro
    depends_on:
      - server

volumes:
  pgdata:
